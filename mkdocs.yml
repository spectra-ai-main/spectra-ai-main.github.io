site_name: Spectra.ai
theme:
  name: material
  palette:
    primary: custom
    accent: custom
    
  features:
    - navigation.tabs            # Horizontal top menu
    - navigation.tabs.sticky     # Keeps top menu visible
    - navigation.sections        # Left sidebar grouping
    - navigation.expand          # Expands left menu by default
    - navigation.indexes         # Allows clicking on parent chapters
    - toc.follow                 # Right sidebar highlights upon scroll
    - content.code.copy          # Copy button on code blocks
  
extra:
  version:
    provider: mike

  css:
    - assets/custom.css

markdown_extensions:
  - attr_list      # Required to recognize the "grid cards" class
  - md_in_html     # Required to process Markdown inside the <div>
  - admonition     # Create highly visible, colored callout boxes
  - pymdownx.superfences    # Nesting and Custom UI widgets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  
nav:
  - Home: index.md
  - About:
    - About the Project: about/index.md
    - Meet the Team: about/team.md
  - Curriculum:
    - Biology:
      - Overview: curriculum/biology/index.md
      - Chapter 1: 
        - Introduction: curriculum/biology/chapter-1/index.md
        - Cellular Structure: curriculum/biology/chapter-1/section-1.md
        - Metabolism: curriculum/biology/chapter-1/section-2.md
        - Mitochondria: curriculum/biology/chapter-1/section-3.md

      - Chapter 2:
        - Introduction: curriculum/biology/chapter-2/index.md
        - Genetics and DNA: curriculum/biology/chapter-2/section-1.md
        - Protein Synthesis: curriculum/biology/chapter-2/section-2.md
        - Cell Division: curriculum/biology/chapter-2/section-3.md